<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لانو - النظام الشامل المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold-foil: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --lano-burgundy: #6f1d1b;
            --paper: #f2e6d0;
            --vintage-red: #8b1f24;
            --ink: #1b1b1b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #2a0a0b 0%, #070102 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Amiri", serif;
            padding: 10px;
        }

        .reservation-box {
            width: 100%;
            max-width: 550px;
            background-color: var(--paper);
            background-image: url("https://www.transparenttextures.com/patterns/cream-paper.png");
            border-radius: 35px;
            position: relative;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            border: 3px solid #bf953f;
            overflow: hidden;
        }

        .inner-content {
            padding: 35px 20px;
            position: relative;
            z-index: 6;
        }

        .header-section h1 {
            font-family: 'Cinzel', serif;
            font-size: 45px;
            text-align: center;
            margin: 0;
            background: var(--gold-foil);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.3));
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin: 30px 0 20px;
            background: rgba(0, 0, 0, 0.08);
            padding: 5px;
            border-radius: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: transparent;
            color: var(--lano-burgundy);
            cursor: pointer;
            font-family: 'Amiri', serif;
            font-weight: bold;
            font-size: 16px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--lano-burgundy);
            color: var(--paper);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .field-group {
            margin-bottom: 20px;
        }

        label {
            font-size: 17px;
            color: var(--vintage-red);
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        .input-royal {
            width: 100%;
            background: white;
            border: 1px solid #ddd;
            border-bottom: 3px solid var(--vintage-red);
            padding: 15px;
            font-family: 'Amiri', serif;
            font-size: 18px;
            text-align: center;
            outline: none;
            border-radius: 12px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .names-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-height: 100px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .tag {
            background: var(--lano-burgundy);
            color: var(--paper);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #bf953f;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: 0.2s;
        }

        .tag:hover {
            background: var(--vintage-red);
        }

        #wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 30px auto;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.5));
        }

        #canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #bf953f;
            background: #fff;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        #pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ffcc00;
            z-index: 30;
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.6));
        }

        #center-bolt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45px;
            height: 45px;
            background: var(--gold-foil);
            border-radius: 50%;
            z-index: 25;
            border: 4px solid var(--lano-burgundy);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .btn-main {
            width: 100%;
            background: var(--lano-burgundy);
            color: var(--paper);
            border: 1px solid #bf953f;
            padding: 18px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-main:disabled {
            background: #555;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 20px;
            text-align: center;
            padding: 20px;
            border: 2px dashed var(--gold-foil);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.6);
            animation: pop 0.5s ease;
        }

        .winner-display {
            font-size: 28px;
            color: var(--vintage-red);
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        @keyframes pop {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .floating-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--lano-burgundy);
            color: var(--paper);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            border: 2px solid #bf953f;
        }
    </style>
</head>
<body>

    <div class="reservation-box">
        <div class="inner-content">
            <div class="header-section">
                <h1>LANO</h1>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('split-tab', this)">
                    <i class="fas fa-calculator"></i> تقسيم الفاتورة
                </button>
                <button class="tab-btn" onclick="switchTab('wheel-tab', this)">
                    <i class="fas fa-dharmachakra"></i> مين يحاسب؟
                </button>
            </div>

            <div id="split-tab" class="section active">
                <div class="field-group">
                    <label>إجمالي المبلغ (ريال)</label>
                    <input type="number" id="totalAmount" class="input-royal" placeholder="0.00">
                </div>
                <div class="field-group">
                    <label>عدد الأشخاص</label>
                    <input type="number" id="peopleCount" class="input-royal" placeholder="كم شخص؟">
                </div>
                <button class="btn-main" onclick="calculateSplit()">
                    <i class="fas fa-calculator"></i> احسب التقسيم
                </button>
                <div id="splitResult" class="result-box" style="display:none;"></div>
            </div>

            <div id="wheel-tab" class="section">
                <div class="input-row">
                    <input type="text" id="nameInput" class="input-royal" placeholder="أدخل اسم..." onkeypress="if(event.key==='Enter')addName()">
                    <button onclick="addName()" style="background:var(--gold-foil); border:none; padding:0 20px; border-radius:12px; cursor:pointer;">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="namesTags" class="names-tags"></div>

                <div id="wheel-wrapper">
                    <div id="pointer"></div>
                    <div id="center-bolt"></div>
                    <canvas id="canvas" width="800" height="800"></canvas>
                </div>

                <button id="spinBtn" class="btn-main" onclick="spinWheel()" disabled>
                    <i class="fas fa-play"></i> لف العجلة الآن
                </button>
                <div id="winnerResult" class="result-box" style="display:none;"></div>
            </div>
        </div>
    </div>

    <div class="floating-btn" onclick="resetAll()">
        <i class="fas fa-redo-alt fa-lg"></i>
    </div>

    <script>
        let names = [];
        let currentRotation = 0;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function switchTab(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function calculateSplit() {
            let total = Math.floor(Number(document.getElementById("totalAmount").value));
            let people = Math.floor(Number(document.getElementById("peopleCount").value));
            let result = document.getElementById("splitResult");

            if (total <= 0 || people <= 0) {
                result.style.display = "block";
                result.innerHTML = "ادخل أرقام صحيحة";
                return;
            }

            let perPerson = Math.floor(total / people);
            let lastPerson = total - (perPerson * (people - 1));

            result.style.display = "block";
            result.innerHTML = `
                <div>كل شخص يدفع</div>
                <h2>${perPerson} ريال</h2>
                <div>الشخص الأخير يدفع</div>
                <h2 style="color:#8b1f24">${lastPerson} ريال</h2>
            `;
        }

        function addName() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (name && !names.includes(name)) {
                names.push(name);
                input.value = '';
                updateWheelUI();
            }
        }

        function updateWheelUI() {
            document.getElementById('namesTags').innerHTML = names.map((n, i) => `<span class="tag" onclick="removeName(${i})">${n} ×</span>`).join('');
            document.getElementById('spinBtn').disabled = names.length < 2;
            drawWheel();
        }

        function removeName(index) {
            names.splice(index, 1);
            updateWheelUI();
        }

        function drawWheel() {
            const n = names.length;
            ctx.clearRect(0, 0, 800, 800);
            if (n === 0) return;

            const sliceAngle = (2 * Math.PI) / n;

            names.forEach((name, i) => {
                const startAngle = i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                ctx.beginPath();
                ctx.fillStyle = i % 2 === 0 ? '#6f1d1b' : '#bf953f';
                ctx.moveTo(400, 400);
                ctx.arc(400, 400, 400, startAngle, endAngle);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.stroke();

                ctx.save();
                ctx.translate(400, 400);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 42px Amiri";
                ctx.shadowColor = "black";
                ctx.shadowBlur = 8;
                ctx.fillText(name, 360, 15);
                ctx.restore();
            });
        }

        function spinWheel() {
            if (names.length < 2) return;
            const spinBtn = document.getElementById('spinBtn');
            const resultDiv = document.getElementById('winnerResult');

            spinBtn.disabled = true;
            resultDiv.style.display = "block";
            resultDiv.innerHTML = "جاري الدوران...";

            const extraDegrees = Math.floor(Math.random() * 360) + 3600;
            currentRotation += extraDegrees;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualRotation = currentRotation % 360;
                const sectorAngle = 360 / names.length;
                let winnerIndex = Math.floor(((270 - (actualRotation % 360) + 360) % 360) / sectorAngle);

                const winner = names[winnerIndex];
                resultDiv.innerHTML = `<div>الي راح يحاسب هو   :</div><div class="winner-display">✨ ${winner} ✨</div>`;
                spinBtn.disabled = false;
            }, 5000);
        }

        function resetAll() {
            if (confirm("مسح كافة البيانات؟")) location.reload();
        }

        drawWheel();
    </script>
</body>
</html>
